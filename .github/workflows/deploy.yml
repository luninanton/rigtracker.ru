name: Deploy CRM via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 FTP Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /    # Usually something like /public_html/ or /data/www/yourdomain.com/
        exclude: |
          **/.git*
          **/.git*/**
          **/scratch/**
          .venv/**
          machinery_scout.db
          *.pyc
